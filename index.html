<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>M3U8 Recorder Pro 🎥</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1><i class="fa-solid fa-record-vinyl"></i> M3U8 Recorder Pro</h1>
      <p>Client-side HLS recorder • Multi-audio track support • ffmpeg.wasm</p>
    </header>

    <div class="card">
      <div class="warning">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <strong>Legal use only.</strong> Record only streams you own or have explicit permission to record. Respect copyright.
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-link"></i> M3U8 / M3U URL</label>
        <input type="url" id="streamUrl" placeholder="https://example.com/stream/index.m3u8" required>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-file-video"></i> Output Format</label>
        <select id="formatSelect">
          <option value="mp4">MP4 - Video + All Audio Tracks</option>
          <option value="mp3">MP3 - Audio Only, Merged Tracks</option>
          <option value="mka">MKA - All Audio Tracks Separate</option>
          <option value="ts">TS - Raw Stream Copy</option>
        </select>
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-clock"></i> Duration (seconds, 0 = until stopped)</label>
        <input type="number" id="duration" placeholder="0" min="0" value="0">
      </div>

      <div class="checkbox-group">
        <label class="checkbox">
          <input type="checkbox" id="allAudioTracks" checked>
          <span>Record ALL audio tracks</span>
        </label>
        <label class="checkbox">
          <input type="checkbox" id="copyCodec" checked>
          <span>Copy codec - faster, no re-encode</span>
        </label>
      </div>

      <div class="btn-group">
        <button class="btn-primary" id="startBtn">
          <i class="fa-solid fa-circle"></i> Start Recording
        </button>
        <button class="btn-danger" id="stopBtn" disabled>
          <i class="fa-solid fa-stop"></i> Stop
        </button>
      </div>

      <div class="progress" id="progress" style="display:none;">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-stats">
          <span id="progressTime">00:00</span>
          <span id="progressSize">0 MB</span>
          <span id="progressStatus">Initializing...</span>
        </div>
      </div>

      <div class="log" id="logOutput"></div>

      <div class="download" id="downloadSection" style="display:none;">
        <h3><i class="fa-solid fa-check-circle"></i> Recording Complete</h3>
        <a id="downloadBtn" class="btn-download">
          <i class="fa-solid fa-download"></i> Download File
        </a>
        <p class="file-info" id="fileInfo"></p>
      </div>
    </div>

    <footer class="footer">
      <p>Uses <a href="https://github.com/ffmpegwasm/ffmpeg.wasm" target="_blank">ffmpeg.wasm</a> • Runs 100% in browser</p>
    </footer>
  </div>

  <script type="module" src="recorder.js"></script>
</body>
</html>
